apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  sources:
    - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      chart: opentelemetry-collector
      targetRevision: 0.111.4 # TODO: confirm against `helm search repo opentelemetry-collector --versions` and pin deliberately
      helm:
        valueFiles:
          - $values/gitops/platform/observability/otel-collector-config.yml
    - repoURL: https://github.com/SaisakthiM/Infrastruture-Project
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
