apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-raw
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/SaisakthiM/Infrastructure-Project
    targetRevision: HEAD
    path: "gitops/observability/raw"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
