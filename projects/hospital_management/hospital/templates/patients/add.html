{% extends 'base.html' %}
{% block content %}

<div class="page-header">
  <div class="page-header-left">
    <div class="page-title">Add Patient</div>
    <div class="page-sub">Register a new patient in the system</div>
  </div>
  <a href="{% url 'manage_patients' %}" class="btn" style="background:#fff;border:1.5px solid #e2e8f0;color:#64748b;font-size:.82rem">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
    Back
  </a>
</div>

<div class="form-card-wrap">
  <div class="card">
    <div class="card-header">
      <span class="card-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0d9488" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-3px;margin-right:6px"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Patient Information
      </span>
    </div>
    <div class="card-body">
      <form method="POST">
        {% csrf_token %}

        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control" placeholder="e.g. John Doe" required>
        </div>

        <div class="form-group">
          <label class="form-label">Age</label>
          <input type="number" name="age" class="form-control" placeholder="Age in years" min="0" max="150" required>
        </div>

        <div class="form-group">
          <label class="form-label">Contact Number</label>
          <input type="text" name="contact" class="form-control" placeholder="+1 (555) 000-0000" required>
        </div>

        <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:8px">
          <a href="{% url 'manage_patients' %}" class="btn" style="background:#fff;border:1.5px solid #e2e8f0;color:#64748b">Cancel</a>
          <button type="submit" class="btn btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Register Patient
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
