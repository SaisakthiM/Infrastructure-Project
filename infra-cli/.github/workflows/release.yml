name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # Trigger on any version tag: v1.0.0, v2.3.1, etc.

permissions:
  contents: write  # Needed to create GitHub Releases and upload assets.

jobs:
  # ── Job 1: Package the infra directory as a release asset ─────────────────
  package-infra:
    name: Package infra/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create infra.tar.gz
        run: |
          # Strip .terraform dirs (large, regenerated by init) and tfstate files
          # (never distribute state). terraform.tfvars are also excluded —
          # users regenerate them via 'social-platform configure'.
          tar --exclude='*/.terraform' \
              --exclude='*/terraform.tfstate*' \
              --exclude='*/terraform.tfvars' \
              --exclude='*/.terraform.lock.hcl' \
              -czf infra.tar.gz \
              -C Projects/Terraform \
              infra/

      - name: Upload infra artifact
        uses: actions/upload-artifact@v4
        with:
          name: infra-tarball
          path: infra.tar.gz

  # ── Job 2: Build CLI binaries for all target platforms ────────────────────
  build-cli:
    name: Build CLI (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            suffix: ""
          - os: linux
            arch: arm64
            suffix: ""
          - os: darwin
            arch: amd64
            suffix: ""
          - os: darwin
            arch: arm64
            suffix: ""
          - os: windows
            arch: amd64
            suffix: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: cli/go.sum

      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o social-platform-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.suffix }} \
            .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}-${{ matrix.arch }}
          path: cli/social-platform-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.suffix }}

  # ── Job 3: Create GitHub Release and attach all assets ────────────────────
  release:
    name: Create GitHub Release
    needs: [package-infra, build-cli]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List dist contents
        run: find dist/ -type f | sort

      - name: Create checksums
        run: |
          cd dist
          find . -type f -not -name 'SHA256SUMS' | sort | xargs sha256sum > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          body: |
            ## social-platform ${{ github.ref_name }}

            ### Installation

            **Linux (amd64)**
            ```bash
            curl -Lo social-platform \
              https://github.com/SaisakthiM/Infrastruture-Project/releases/download/${{ github.ref_name }}/social-platform-linux-amd64
            chmod +x social-platform && sudo mv social-platform /usr/local/bin/
            ```

            **macOS (Apple Silicon)**
            ```bash
            curl -Lo social-platform \
              https://github.com/SaisakthiM/Infrastruture-Project/releases/download/${{ github.ref_name }}/social-platform-darwin-arm64
            chmod +x social-platform && sudo mv social-platform /usr/local/bin/
            ```

            ### First run
            ```bash
            social-platform install    # install prereqs + download infra
            social-platform configure  # enter secrets → generates tfvars
            social-platform deploy     # terragrunt run-all apply
            ```

            ### Changelog
            See commit history for changes in this release.
          files: |
            dist/**/*
          fail_on_unmatched_files: false
          generate_release_notes: true
